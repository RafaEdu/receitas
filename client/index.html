<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Receitas</title>
    <!-- Folha de estilo da interface -->
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="container">
      <h1>Lista de Receitas</h1>

      <!-- Secao de autenticacao -->
      <section id="loginSection" class="card">
        <h2>Login</h2>
        <form id="loginForm" class="form">
          <label for="loginInput">Login</label>
          <input id="loginInput" name="login" type="text" required />

          <label for="senhaInput">Senha</label>
          <input id="senhaInput" name="senha" type="password" required />

          <button type="submit">Entrar</button>
        </form>
        <p id="loginMessage" class="message"></p>
      </section>

      <!-- Secao principal exibida apos autenticacao -->
      <section id="appSection" class="hidden">
        <!-- Barra superior com status de conexao e logout -->
        <div class="top-bar">
          <p id="status" class="status">Conferindo conexao com o banco...</p>
          <button id="logoutBtn" class="btn-secondary" type="button">
            Sair
          </button>
        </div>

        <!-- Tabela de receitas carregada dinamicamente via app.js -->
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Descricao</th>
                <th>Data</th>
                <th>Custo</th>
                <th>Tipo</th>
                <th>
                  Acoes
                  <button
                    id="toggleFiltersBtn"
                    class="btn-inline btn-filter-toggle"
                    type="button"
                    aria-expanded="false"
                  >
                    Filtros
                  </button>
                </th>
              </tr>
              <tr id="filtersRow" class="filters-row hidden">
                <th>
                  <input
                    id="filterIdInput"
                    class="inline-input"
                    type="text"
                    placeholder="Filtrar ID"
                  />
                </th>
                <th>
                  <input
                    id="filterNomeInput"
                    class="inline-input"
                    type="text"
                    placeholder="Filtrar Nome"
                  />
                </th>
                <th>
                  <input
                    id="filterDescricaoInput"
                    class="inline-input"
                    type="text"
                    placeholder="Filtrar Descricao"
                  />
                </th>
                <th>
                  <input
                    id="filterDataInput"
                    class="inline-input"
                    type="date"
                  />
                </th>
                <th>
                  <input
                    id="filterCustoInput"
                    class="inline-input"
                    type="text"
                    value="00,00"
                    inputmode="numeric"
                  />
                </th>
                <th>
                  <select id="filterTipoSelect" class="inline-input">
                    <option value="">Todos</option>
                    <option value="S">Salgado (S)</option>
                    <option value="D">Doce (D)</option>
                  </select>
                </th>
                <th class="actions-cell">
                  <button
                    id="applyFiltersBtn"
                    class="btn-inline btn-filter-search"
                    type="button"
                    title="Aplicar filtros"
                    aria-label="Aplicar filtros"
                  >
                    <svg
                      class="filter-search-icon"
                      width="14"
                      height="14"
                      viewBox="0 0 24 24"
                      aria-hidden="true"
                    >
                      <circle cx="11" cy="11" r="6.5" fill="none" stroke="currentColor" stroke-width="2" />
                      <line x1="16" y1="16" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    </svg>
                  </button>
                </th>
              </tr>
            </thead>
            <tbody id="receitasBody">
              <tr>
                <td colspan="7">Carregando dados...</td>
              </tr>
            </tbody>
          </table>

          <p id="filterSummary" class="filter-summary hidden"></p>

          <!-- Rodape colado na tabela com acao de criar nova receita -->
          <div class="table-footer">
            <button id="addReceitaBtn" class="btn-inline" type="button">
              Adicionar nova receita
            </button>
          </div>
        </div>
      </section>
    </main>

    <!-- Script principal da aplicacao cliente -->
    <script src="./app.js"></script>
  </body>
</html>
